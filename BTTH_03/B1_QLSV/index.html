<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Sinh Viên</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>HỆ THỐNG QUẢN LÝ SINH VIÊN</h1>

        <!-- Thống kê -->
        <div class="statistics">
            <p>Tổng số sinh viên: <span id="totalStudents">0</span></p>
            <p>Điểm trung bình lớp: <span id="averageGPA">0</span></p>
        </div>

        <!-- Nút thêm -->
        <button id="openModalBtn" class="add-btn">
            + Thêm Sinh Viên
        </button>

        <!-- Thông báo -->
        <div id="message"></div>

        <!-- Bảng -->
        <table>

            <thead>
                <tr>
                    <th>STT</th>
                    <th>Mã SV</th>
                    <th>Họ Tên</th>
                    <th>Ngày Sinh</th>
                    <th>Lớp</th>
                    <th>Điểm TB</th>
                    <th>Email</th>
                    <th>Hành Động</th>
                </tr>
            </thead>

            <tbody id="studentTable">
                <!-- Render bằng JS -->
            </tbody>

        </table>

    </div>

    <!-- Modal -->
    <div class="modal" id="studentModal">

        <div class="modal-content">

            <span class="close-btn" id="closeModalBtn">&times;</span>

            <h2 id="modalTitle">Thêm Sinh Viên</h2>

            <form id="studentForm">

                <input type="hidden" id="editIndex">

                <label>Mã sinh viên</label>
                <input type="text" id="studentId" required>

                <label>Họ và tên</label>
                <input type="text" id="studentName" required>

                <label>Ngày sinh</label>
                <input type="date" id="birthday" required>

                <label>Lớp học</label>
                <input type="text" id="className" required>

                <label>Điểm trung bình</label>
                <input type="number" id="gpa" step="0.1" required>

                <label>Email</label>
                <input type="email" id="email" required>

                <button type="submit" class="save-btn">
                    Lưu Sinh Viên
                </button>

            </form>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
