<!doctype html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Validation Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input {
      padding: 8px;
      width: 300px;
    }

    button {
      padding: 8px 16px;
      background-color: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <form onsubmit="
        event.preventDefault();
        alert('Form hợp lệ! Gửi thành công!');
      ">
    <div class="form-group">
      <label>Trường hợp 1 (required):</label>
      <input type="text" required value="" />
    </div>

    <div class="form-group">
      <label>Trường hợp 2 (type="email"):</label>
      <input type="email" value="abc" />
    </div>

    <div class="form-group">
      <label>Trường hợp 3 (number min/max):</label>
      <input type="number" min="1" max="10" value="15" />
    </div>

    <div class="form-group">
      <label>Trường hợp 4 (pattern):</label>
      <input type="text" pattern="[0-9]{10}" value="abc123" />
    </div>

    <div class="form-group">
      <label>Trường hợp 5 (password minlength):</label>
      <input type="password" minlength="8" value="123" />
    </div>

    <button type="submit">Submit</button>
  </form>
</body>

</html>
