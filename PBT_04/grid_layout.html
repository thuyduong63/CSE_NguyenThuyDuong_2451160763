<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Grid E-Commerce</title>
    <link rel="stylesheet" href="grid.css">
</head>

<body>

<div class="layout">

    <!-- HEADER -->
    <header class="header">
        HEADER
    </header>

    <!-- HERO -->
    <section class="hero">
        HERO BANNER (Featured Product)
    </section>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h3>Filter</h3>
        <label><input type="checkbox"> Giá rẻ</label><br>
        <label><input type="checkbox"> Hot</label><br>
        <label><input type="checkbox"> Sale</label>
    </aside>

    <!-- MAIN -->
    <main class="main">

        <!-- GRID PRODUCTS -->
        <div class="products">

            <div class="card">Product 1</div>
            <div class="card">Product 2</div>
            <div class="card">Product 3</div>
            <div class="card">Product 4</div>
            <div class="card">Product 5</div>
            <div class="card">Product 6</div>

        </div>

    </main>

    <!-- ADS -->
    <aside class="ads">
        ADS AREA
    </aside>

    <!-- FOOTER -->
    <footer class="footer">
        FOOTER
    </footer>

</div>

</body>
</html>
