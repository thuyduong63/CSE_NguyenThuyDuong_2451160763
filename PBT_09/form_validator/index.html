<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1> Đăng ký tài khoản</h1>
        <form id="registerForm" novalidate>
            <div class="form-group">
                <label for="name">Họ và tên</label>
                <input type="text" id="name" placeholder="Nguyễn Văn A">
                <span class="status-icon"></span>
                <p class="error-msg"></p>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="example@email.com">
                <span class="status-icon"></span>
                <p class="error-msg"></p>
            </div>
            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" placeholder="Nhập mật khẩu">
                <span class="status-icon"></span>
                <div class="strength-bar"><div class="strength-fill"></div></div>
                <p class="strength-text"></p>
                <p class="error-msg"></p>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Xác nhận mật khẩu</label>
                <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu">
                <span class="status-icon"></span>
                <p class="error-msg"></p>
            </div>
            <div class="form-group">
                <label for="phone">Số điện thoại</label>
                <input type="tel" id="phone" placeholder="0901-234-567" maxlength="12">
                <span class="status-icon"></span>
                <p class="error-msg"></p>
            </div>
            <button type="submit" id="submitBtn" disabled>Đăng ký</button>
        </form>
    </div>
    <div id="successModal" class="modal-overlay" style="display:none">
        <div class="modal">
            <h2>🎉 Đăng ký thành công!</h2>
            <div id="modalContent"></div>
            <button id="modalClose">Đóng</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
